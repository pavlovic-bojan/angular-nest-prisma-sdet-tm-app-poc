name: Performance Tests

# Manual only – requires BASE_URL (backend running locally or hosted)
# No hosted DB/backend yet – provide URL via input or BACKEND_URL secret
# See: tests/performance/README.md
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - baseline
          - load
          - stress
          - spike
          - breakpoint
          - soak
          - all
      base_url:
        description: "Backend URL (e.g. http://localhost:3000 or hosted URL)"
        required: true
        type: string

jobs:
  performance:
    name: k6 Performance Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Run performance test
        working-directory: tests/performance
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL || 'demo@example.com' }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD || 'password123' }}
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type || 'smoke' }}"
          case "$TEST_TYPE" in
            smoke)      k6 run smoke/smoke.js ;;
            baseline)   k6 run baseline/baseline.js ;;
            load)       k6 run load/load.js ;;
            stress)     k6 run stress/stress.js ;;
            spike)      k6 run spike/spike.js ;;
            breakpoint) k6 run breakpoint/breakpoint.js ;;
            soak)       k6 run soak/soak.js ;;
            all)        k6 run smoke/smoke.js && k6 run baseline/baseline.js && k6 run load/load.js ;;
            *)          k6 run smoke/smoke.js ;;
          esac
